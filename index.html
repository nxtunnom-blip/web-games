<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You 💗</title>
  <style>
    body {
      margin: 0;
      font-family: monospace;
      background: black;
      color: #ff69b4;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .box {
      background: rgba(255, 105, 180, 0.1);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 25px #ff69b4;
      text-align: left;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #ff69b4;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #typingLine::after {
      content: '|';
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
  <div class="box" id="formBox">
    <div id="typingLine"></div>
    <input type="text" placeholder="Your Name"><br>
    <input type="text" placeholder="Crush Name"><br>
    <input type="text" placeholder="Secret Info 😏"><br>
    <button onclick="startPrank()">Submit</button>
  </div>

  <div class="box" id="resultBox" style="display:none;">
    <div id="finalTyping"></div>
  </div>
</div>

<script>
  const lines = [
    "Connecting to love server...",
    "Scanning emotions...",
    "Reading secret data...",
    "Analyzing crush feelings...",
    "Finalizing result..."
  ];

  function typeLines(element, lines, speed, callback) {
    let lineIndex = 0;
    function nextLine() {
      if (lineIndex >= lines.length) {
        if (callback) callback();
        return;
      }
      let text = lines[lineIndex];
      let i = 0;
      element.innerHTML = "";

      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        } else {
          lineIndex++;
          setTimeout(nextLine, 500);
        }
      }
      typing();
    }
    nextLine();
  }

  typeLines(document.getElementById("typingLine"), ["Answer honestly... 💗"], 50);

  function startPrank() {
    document.getElementById("formBox").style.display = "none";
    document.getElementById("resultBox").style.display = "block";

    typeLines(document.getElementById("finalTyping"), lines, 40, () => {
      setTimeout(() => {
        document.getElementById("finalTyping").innerHTML = "💗 RAFI 💗<br>Got you 😆";
      }, 800);
    });
  }

  // particles
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];
  for (let i = 0; i < 100; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 1,
      d: Math.random() * 1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ff69b4";
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    particles.forEach(p => {
      p.y += p.d;
      if (p.y > canvas.height) {
        p.y = 0;
        p.x = Math.random() * canvas.width;
      }
    });
  }

  setInterval(draw, 30);
</script>

</body>
</html>
