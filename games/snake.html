<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - PS RAFi 007</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 PS RAFi 007</h1>
        </header>

        <nav class="navbar">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="tictactoe.html">Tic Tac Toe</a></li>
                <li><a href="snake.html" class="active">Snake</a></li>
                <li><a href="memory.html">Memory Game</a></li>
                <li><a href="flappy.html">Flappy Bird</a></li>
                <li><a href="pong.html">Pong</a></li>
            </ul>
        </nav>

        <div class="game-container">
            <div class="game-header">
                <h2>🐍 Snake Game</h2>
                <p>Score: <strong id="score">0</strong> | High Score: <strong id="highScore">0</strong></p>
            </div>

            <div class="game-controls">
                <button id="startBtn" onclick="startGame()">Start Game</button>
                <button id="pauseBtn" onclick="togglePause()" disabled>Pause</button>
            </div>

            <canvas id="gameCanvas" width="400" height="400"></canvas>

            <p style="text-align: center; color: #666; margin-top: 20px;">
                <strong>Controls:</strong> Use Arrow Keys or WASD to move
            </p>

            <a href="../index.html" class="back-btn">← Back to Home</a>
        </div>
    </div>

    <script src="snake.js"></script>
</body>
</html>
