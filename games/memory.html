<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - PS RAFi 007</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 PS RAFi 007</h1>
        </header>

        <nav class="navbar">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="tictactoe.html">Tic Tac Toe</a></li>
                <li><a href="snake.html">Snake</a></li>
                <li><a href="memory.html" class="active">Memory Game</a></li>
                <li><a href="flappy.html">Flappy Bird</a></li>
                <li><a href="pong.html">Pong</a></li>
            </ul>
        </nav>

        <div class="game-container">
            <div class="game-header">
                <h2>🧠 Memory Game</h2>
                <p>Moves: <strong id="moves">0</strong> | Matched: <strong id="matched">0</strong>/8</p>
            </div>

            <div class="game-controls">
                <button onclick="resetMemoryGame()">New Game</button>
            </div>

            <div id="memory-board" style="display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; margin: 30px auto; width: fit-content;">
            </div>

            <a href="../index.html" class="back-btn">← Back to Home</a>
        </div>
    </div>

    <style>
        .memory-card {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            font-size: 2em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            color: white;
        }

        .memory-card:hover {
            transform: scale(1.05);
        }

        .memory-card.flipped {
            background: #fff;
            color: #333;
        }

        .memory-card:disabled {
            cursor: not-allowed;
        }
    </style>

    <script src="memory.js"></script>
</body>
</html>
