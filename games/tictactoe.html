<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - PS RAFi 007</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 PS RAFi 007</h1>
        </header>

        <nav class="navbar">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="tictactoe.html" class="active">Tic Tac Toe</a></li>
                <li><a href="snake.html">Snake</a></li>
                <li><a href="memory.html">Memory Game</a></li>
                <li><a href="flappy.html">Flappy Bird</a></li>
                <li><a href="pong.html">Pong</a></li>
            </ul>
        </nav>

        <div class="game-container">
            <div class="game-header">
                <h2>⭕ Tic Tac Toe</h2>
                <p id="status">Your Turn (X)</p>
            </div>

            <div class="game-controls">
                <button onclick="resetGame()">New Game</button>
            </div>

            <div id="game-board" style="display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin: 30px auto; width: fit-content;">
                <button class="cell" data-index="0"></button>
                <button class="cell" data-index="1"></button>
                <button class="cell" data-index="2"></button>
                <button class="cell" data-index="3"></button>
                <button class="cell" data-index="4"></button>
                <button class="cell" data-index="5"></button>
                <button class="cell" data-index="6"></button>
                <button class="cell" data-index="7"></button>
                <button class="cell" data-index="8"></button>
            </div>

            <a href="../index.html" class="back-btn">← Back to Home</a>
        </div>
    </div>

    <style>
        .cell {
            width: 100px;
            height: 100px;
            font-size: 2em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cell:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .cell:disabled {
            cursor: not-allowed;
        }
    </style>

    <script src="tictactoe.js"></script>
</body>
</html>
